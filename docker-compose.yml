version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite+aiosqlite:///data/kb.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
